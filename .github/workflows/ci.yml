name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Run unit tests and coverage gate
        run: mvn --batch-mode verify

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: hw-5-jacoco-report
          path: hw-5/target/site/jacoco/

  code-scanning-quality:
    name: Code Scanning / Quality
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL quality queries
        uses: github/codeql-action/init@v3
        with:
          languages: java
          queries: +security-and-quality

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build for CodeQL
        run: mvn --batch-mode -DskipTests package

      - name: Analyze quality findings
        uses: github/codeql-action/analyze@v3
        with:
          category: /language:java-quality

  code-scanning-security:
    name: Code Scanning / Security
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL security queries
        uses: github/codeql-action/init@v3
        with:
          languages: java
          queries: +security-extended

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build for CodeQL
        run: mvn --batch-mode -DskipTests package

      - name: Analyze security findings
        uses: github/codeql-action/analyze@v3
        with:
          category: /language:java-security

  dependency-review:
    name: Code Scanning / Security / Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Review dependency changes
        uses: actions/dependency-review-action@v4
